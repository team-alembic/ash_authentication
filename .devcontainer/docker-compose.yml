services:
  app:
    image: mcr.microsoft.com/devcontainers/base:debian
    volumes:
      - ..:/workspaces/ash_authentication:cached
      - dialyzer-plt:/home/vscode/.mix
    command: sleep infinity
    environment:
      DATABASE_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ash_authentication_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  dialyzer-plt:
